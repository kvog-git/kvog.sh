{{ partial "header.html" . }}
<div class="article-meta">
<h1>{{ .Title | markdownify }}</h1>
{{ with .Params.author }}<p class="author">{{ . }}</p>{{ end }}
{{ if (gt .Params.date 0) }}<p class="date">{{ .Date.Format "01/02/2006" }}</p>{{ end }}
</div>

<main class="main">
{{ .Content }}
</main>

{{ partial "footer.html" . }}
